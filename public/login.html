<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Entrar — Estalise</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="site-header"></div>

<div class="form-card">
  <h1>Entrar</h1>
  <p class="sub">Acesse sua conta para finalizar compras e acompanhar pedidos.</p>

  <form onsubmit="handleLogin(event)">
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="email" class="field" required />
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="senha" class="field" required />
    </div>
    <button id="btn-login" type="submit" class="btn btn-primary btn-block">Entrar</button>
    <p id="auth-msg" class="form-msg"></p>
  </form>

  <div class="form-footer">
    <a href="#" onclick="handleRecuperarSenha()" style="color:var(--gray)">Esqueci minha senha</a>
  </div>
  <div class="form-footer">
    Ainda não tem conta? <a href="cadastro.html" style="color:var(--white);text-decoration:underline">Cadastre-se</a>
  </div>
</div>

<div id="site-footer" class="site-footer"></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="js/config.js"></script>
<script src="js/firebaseClient.js"></script>
<script src="js/cart.js"></script>
<script src="js/layout.js"></script>
<script src="js/auth.js"></script>
<script>
  renderLayout("");
</script>
</body>
</html>
