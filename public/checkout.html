<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checkout — Estalise</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="site-header"></div>

<div class="container">
  <h1 style="padding-top:40px">Checkout</h1>

  <div class="cart-layout">
    <form id="form-checkout" onsubmit="finalizarPedido(event)">
      <h3 style="margin-bottom:20px">Endereço de entrega</h3>

      <div class="form-group">
        <label>CEP</label>
        <input type="text" id="cep-endereco" class="field" required maxlength="9" />
      </div>
      <div class="form-group">
        <label>Logradouro</label>
        <input type="text" id="logradouro" class="field" required />
      </div>
      <div class="flex gap-8">
        <div class="form-group" style="flex:1">
          <label>Número</label>
          <input type="text" id="numero" class="field" required />
        </div>
        <div class="form-group" style="flex:2">
          <label>Complemento</label>
          <input type="text" id="complemento" class="field" />
        </div>
      </div>
      <div class="form-group">
        <label>Bairro</label>
        <input type="text" id="bairro" class="field" required />
      </div>
      <div class="flex gap-8">
        <div class="form-group" style="flex:2">
          <label>Cidade</label>
          <input type="text" id="cidade" class="field" required />
        </div>
        <div class="form-group" style="flex:1">
          <label>UF</label>
          <input type="text" id="uf" class="field" maxlength="2" required />
        </div>
      </div>

      <button id="btn-finalizar" type="submit" class="btn btn-primary btn-block">Ir para pagamento</button>
      <p id="checkout-msg" class="form-msg"></p>
      <p style="color:var(--gray);font-size:12px;margin-top:12px">Você será redirecionado ao checkout seguro da InfinityPay para concluir o pagamento via Pix ou cartão.</p>
    </form>

    <div id="resumo-checkout"></div>
  </div>
</div>

<div id="site-footer" class="site-footer"></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<script src="js/config.js"></script>
<script src="js/firebaseClient.js"></script>
<script src="js/cart.js"></script>
<script src="js/layout.js"></script>
<script src="js/checkout.js"></script>

<script>
document.addEventListener(
  "DOMContentLoaded",
  () => {
    renderLayout("carrinho");
    initCheckout();
  }
);
</script>
</body>
</html>
