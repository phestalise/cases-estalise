<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Criar conta — Eatalise</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="site-header"></div>

<div class="form-card">
  <h1>Criar conta</h1>
  <p class="sub">Preencha seus dados para começar a comprar.</p>

  <form onsubmit="handleCadastro(event)">
    <div class="form-group">
      <label>Nome completo</label>
      <input type="text" id="nome" class="field" required />
    </div>
    <div class="form-group">
      <label>CPF</label>
      <input type="text" id="cpf" class="field" required maxlength="14"
        oninput="this.value = formatarCPF(this.value)" />
    </div>
    <div class="form-group">
      <label>Telefone</label>
      <input type="tel" id="telefone" class="field" placeholder="(11) 99999-9999" />
    </div>
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="email" class="field" required />
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="senha" class="field" required minlength="6" />
    </div>
    <button id="btn-cadastro" type="submit" class="btn btn-primary btn-block">Criar conta</button>
    <p id="auth-msg" class="form-msg"></p>
  </form>

  <div class="form-footer">
    Já tem conta? <a href="login.html" style="color:var(--white);text-decoration:underline">Entrar</a>
  </div>
</div>

<div id="site-footer" class="site-footer"></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<script src="js/config.js"></script>
<script src="js/firebaseClient.js"></script>
<script src="js/cart.js"></script>
<script src="js/layout.js"></script>
<script src="js/cpf.js"></script>
<script src="js/auth.js"></script>
<script>
  renderLayout("");
</script>
</body>
</html>
